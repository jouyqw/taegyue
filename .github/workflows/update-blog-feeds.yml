name: Update blog feeds

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare_pages_upload/blog/**/*.html"
      - "scripts/generate-blog-feeds.js"
      - ".github/workflows/update-blog-feeds.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate content quality
        run: node scripts/validate-content-quality.mjs

      - name: Generate blog index, sitemap, and RSS
        run: node scripts/generate-blog-feeds.js

      - name: Commit generated files
        run: |
          if git diff --quiet -- cloudflare_pages_upload/blog/index.html cloudflare_pages_upload/sitemap.xml cloudflare_pages_upload/rss.xml; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloudflare_pages_upload/blog/index.html cloudflare_pages_upload/sitemap.xml cloudflare_pages_upload/rss.xml
          git commit -m "Update blog feeds"
          git push
